<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wine Dental Aesthetic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --wine: #722F37; }
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
        .bg-wine { background: var(--wine); color: white; }
        .text-wine { color: var(--wine); }
        .card-glass { background: white; border-radius: 15px; border: none; box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        .btn-wine { background: var(--wine); color: white; border-radius: 10px; font-weight: 600; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
