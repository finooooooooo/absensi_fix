{% extends "base.html" %}
{% block content %}
<div class="container d-flex flex-column justify-content-center align-items-center min-vh-100">
    <div class="card card-glass p-5 w-100 shadow-lg" style="max-width: 400px;">
        <div class="text-center mb-4">
            <h2 class="text-wine fw-bold mb-0">WINE DENTAL</h2>
            <p class="text-muted small">Employee Portal Access</p>
        </div>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} py-2 small border-0 rounded-3 text-center fw-bold shadow-sm">
                    <i class="fas fa-exclamation-circle me-1"></i> {{ message }}
                </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="small text-muted mb-1 fw-bold">Username</label>
                <input type="text" class="form-control border-0 bg-light p-3 rounded-3" name="username" placeholder="Masukkan ID/Username" required autocomplete="off">
            </div>
            <div class="mb-4">
                <label class="small text-muted mb-1 fw-bold">Password</label>
                <input type="password" class="form-control border-0 bg-light p-3 rounded-3" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-wine w-100 py-3 fw-bold shadow-sm text-uppercase letter-spacing-1">Login System</button>
        </form>
    </div>
</div>
{% endblock %}
